name: beacon

services:
  frontend-build:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: beacon/frontend-build:local
    volumes:
      - frontend_dist:/out
    command: ["sh", "-c", "rm -rf /out/* && cp -r /app/dist/. /out/"]
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: beacon/backend:local
    container_name: beacon-backend
    restart: unless-stopped
    privileged: true
    pid: host
    # NOT network_mode: host — backend stays on the compose bridge so Caddy
    # reaches it via the service name `backend:8000`. pid=host + bind-mount /
    # are what give us host management; network_mode is independent.
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      HOST_ROOT: /host
      DATA_DIR: /data
      CONFIG_DIR: /config
      BIND_HOST: 0.0.0.0
      BIND_PORT: 8000
    expose:
      - "8000"
    volumes:
      - /:/host:rw
      - /run/dbus:/run/dbus
      - backend_data:/data
      - ./config:/config:rw
      - ./config.example:/config.example:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  caddy:
    image: caddy:2.8-alpine
    container_name: beacon-caddy
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      BACKEND_UPSTREAM: ${BACKEND_UPSTREAM:-backend:8000}
      EXTRA_HOSTNAME: ${EXTRA_HOSTNAME:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - frontend_dist:/srv/www:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend-build:
        condition: service_completed_successfully
      backend:
        condition: service_healthy

volumes:
  frontend_dist:
  backend_data:
  caddy_data:
  caddy_config:
